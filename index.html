<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<title>私のミニアプリ</title>
</head>
<body>
	<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
	<script>
		//LIFFの初期化
		// Line DevelopersのLIFF設定画面にあるID
		liff.init({ liffId: "2010446717-4NcJNzWv" }).then(() => {
			if (liff.isLoggedIn()) {
				liff.getProfile().then(p => alert("こんにちは、" + p.displayName + "さん！")).catch(e => console.log(e));
			} else {
				liff.login();
			}
		}).catch((err) => {
			alert("エラーが発生しました：" + err.message);
		});
	</script>

	<button id="scanButton">スタンプをもらう（QR読み取り）</button>
	
	<script>
		document.getElementById('scanButton').addEventListener('click', async () => {
			//ボタンが押されたらカメラを起動
			//async function scanQRCode() {
				if(liff.scanCode) {
					const result = await liff.scanCode();
					alert("読み取った内容：" + result.value);
					//ここで result.value (QRコードの中身)をサーバに送る
				} else {
					alert("この環境ではQR読み取りができません");
				}
			//}
		});
		
	</script>
