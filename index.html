<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<title>私のミニアプリ</title>
</head>
<body>
	<script>
		//LIFFの初期化
		liff.init({liffId: "あなたのLIFF ID" // Line DevelopersのLIFF設定画面にあるID
		}).then(() => {
			// ログイン済みかチェック
			if(liff.isLoggedIn()){
				// ログインしていればユーザのプロフィール取得
				liff.getProfile().then(profile => {
					alert("こんにちは、" + profile.displayName + "さん！");
				});
			} else {
				// 未ログインならログインさせる
				liff.login();
			}
		});
	</script>
	
	<script src="https://static.line-scdn.net/liff/edge/2/sdk.js">
	</script>

	<!--
	<h1>こんにちは！</h1>
	<p>これが初めてのLINEミニアプリの画面です。</p>
	<button onclick="alert('ボタンが押されました！')">押してみてね</button>
	-->
</body>
</html>
