<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<title>私のミニアプリ</title>
</head>
<body>
	<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
	"1"
	<script>
		//LIFFの初期化
		// Line DevelopersのLIFF設定画面にあるID
		liff.init({ liffId: "2010446717-4NcJNzWv" }).then(() => {
			if (liff.isLoggedIn()) {
				liff.getProfile().then(p => alert("こんにちは、" + p.displayName + "さん！")).catch(e => console.log(e));
			} else {
				liff.login();
			}
		}).catch((err) => {
			alert("エラーが発生しました：" + err.message);
		});
	</script>
	"2"

</body>
</html>
